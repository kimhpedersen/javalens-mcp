name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Install Maven (Linux)
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y maven

    - name: Install Maven (macOS)
      if: runner.os == 'macOS'
      run: brew install maven

    # Windows: rely on Maven and Gradle that are pre-installed on the GitHub
    # Actions windows-latest image. Installing via chocolatey on top side-loads
    # an additional JDK and reorders PATH, which is what triggered the
    # `lib/jvm.cfg` launcher failure when our test JVM spawned mvn/gradle.

    # apt's Gradle on ubuntu-latest is 4.x, too old for our init script.
    - name: Install Gradle (Linux + macOS)
      if: runner.os != 'Windows'
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.10.2'

    - name: Verify pre-installed tools (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        Write-Host "JAVA_HOME=$env:JAVA_HOME"
        Write-Host "where java:"; (Get-Command java -All | Select-Object -ExpandProperty Source) -join "`n" | Write-Host
        Write-Host "where mvn:"; (Get-Command mvn -All -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source) -join "`n" | Write-Host
        Write-Host "where gradle:"; (Get-Command gradle -All -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source) -join "`n" | Write-Host
        mvn -v
        gradle -v

    - name: Install Bazel
      uses: bazel-contrib/setup-bazel@0.8.5
      with:
        bazelisk-cache: true
        disk-cache: true
        repository-cache: true

    - name: Cache Maven local repository
      uses: actions/cache@v4
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml', '**/test-resources/sample-projects/**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-m2-

    - name: Cache Gradle caches
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/test-resources/sample-projects/**/*.gradle*') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Build and Test
      env:
        JAVALENS_TESTS_REQUIRE_TOOLS: "true"
      run: ./mvnw clean verify

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ matrix.os }}
        path: |
          **/target/surefire-reports/
          **/target/failsafe-reports/
