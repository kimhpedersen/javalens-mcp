name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    # Maven: setup-java installs the JDK only. We need mvn on PATH for fixture tests
    # that invoke it directly. apt/brew provide working binaries; on Windows, choco's
    # mvn.cmd launcher is incompatible with setup-java's Temurin JDK (it tries to read
    # lib/jvm.cfg which Temurin doesn't ship), so we extract the Apache distribution
    # directly and add its bin to PATH.
    - name: Install Maven (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: sudo apt-get update && sudo apt-get install -y maven

    - name: Install Maven (macOS)
      if: matrix.os == 'macos-latest'
      run: brew install maven

    - name: Install Maven (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        $version = "3.9.9"
        $url = "https://archive.apache.org/dist/maven/maven-3/$version/binaries/apache-maven-$version-bin.zip"
        Invoke-WebRequest -Uri $url -OutFile $env:RUNNER_TEMP\maven.zip
        Expand-Archive -Path $env:RUNNER_TEMP\maven.zip -DestinationPath $env:RUNNER_TEMP\maven
        $bin = "$env:RUNNER_TEMP\maven\apache-maven-$version\bin"
        Add-Content $env:GITHUB_PATH $bin

    # Gradle: vendor-supported action works on all three OSes. apt's package on
    # ubuntu-latest is Gradle 4.x, too old to run our init script (uses tasks.register
    # and other 6.0+ syntax); choco's gradle.bat on Windows didn't propagate reliably
    # to the surefire JVM. setup-gradle handles all of these uniformly.
    - name: Install Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.10.2'

    # Bazel via bazelisk — installs the Bazel version pinned in fixtures via .bazelversion files.
    - name: Install bazelisk
      uses: bazel-contrib/setup-bazel@0.8.5
      with:
        bazelisk-cache: true
        disk-cache: true
        repository-cache: true

    - name: Cache Maven local repository
      uses: actions/cache@v4
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml', '**/test-resources/sample-projects/**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-m2-

    - name: Cache Gradle caches
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/test-resources/sample-projects/**/*.gradle*', '**/test-resources/sample-projects/**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Build and Test
      env:
        # Tests gate optional steps via Assumptions so local dev doesn't fail on a clean
        # machine. In CI we install every tool above, so any skip would mean a real
        # provisioning gap. This env var flips the gate to assert-presence: tests fail
        # loudly instead of skipping when a required tool is missing.
        JAVALENS_TESTS_REQUIRE_TOOLS: "true"
      run: ./mvnw clean verify

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ matrix.os }}
        path: |
          **/target/surefire-reports/
          **/target/failsafe-reports/
